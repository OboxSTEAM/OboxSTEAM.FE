services:
  obox-frontend:
    image: oboxsteam-fe
    container_name: obox-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined at build time — set in .env before `docker compose build`
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.oboxsteam.website}
    restart: always
    environment:
      NODE_ENV: production
      # Placeholder; client bundle uses the build-arg value above
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.oboxsteam.website}
    networks:
      - shared_network

networks:
  shared_network:
    external: true